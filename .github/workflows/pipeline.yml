name: secure-gateway

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  scan-secrets:
    name: Secrets Scan
    runs-on: ubuntu-latest
    container:
      image: suyog942/secure-gateway:1.0.0
    steps:
      - uses: actions/checkout@v4

      - name: Scan config for secrets
        run: gateway -config gateway/testdata/config_clean.yaml -rules gateway/rules.json

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Init (no backend)
        run: terraform -chdir=terraform/environments/dev init -backend=false

      - name: Validate
        run: terraform -chdir=terraform/environments/dev validate

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: scan-secrets
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build binary
        run: cd gateway && go build -o ../dist/myapp .

      - name: Generate SHA-256
        run: shasum -a 256 dist/myapp | awk '{print $1}' > dist/myapp.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: myapp
          path: |
            dist/myapp
            dist/myapp.sha256

  verify-integrity:
    name: Integrity Check
    runs-on: ubuntu-latest
    needs: build
    container:
      image: suyog942/secure-gateway:1.0.0
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: myapp
          path: dist/

      - name: Verify integrity
        run: |
          HASH=$(cat dist/myapp.sha256)
          gateway -file dist/myapp -sha256 "$HASH"
